<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Traffic Light</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="light-widget" id="lightWidget">
    <div class="housing">
      <div class="light red" id="redLight">
        <div class="light-inner"></div>
        <div class="glow"></div>
      </div>
      <div class="light yellow" id="yellowLight">
        <div class="light-inner"></div>
        <div class="glow"></div>
      </div>
      <div class="light green" id="greenLight">
        <div class="light-inner"></div>
        <div class="glow"></div>
      </div>
    </div>
    <div class="session-dots" id="sessionDots"></div>
    <div class="lock-btn" id="lockBtn" aria-label="锁定当前会话">
      <svg class="lock-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <!-- unlocked: shackle on the left, body on the right -->
        <path class="lock-shackle-open" d="M7 10V7a5 5 0 0 1 9.9-1"/>
        <rect class="lock-body" x="4" y="10" width="16" height="11" rx="2"/>
        <circle class="lock-keyhole" cx="12" cy="15.5" r="1.2" fill="currentColor" stroke="none"/>
        <line class="lock-keybar" x1="12" y1="15.5" x2="12" y2="17.5"/>
      </svg>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
